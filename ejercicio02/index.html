<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 02 - TP1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">

    <script src="app.js" defer></script>
</head>
<body>
    <div class="container mt-5">

        <h1 class="text-center">REGISTRO DE COCHES</h1>

        <div class="card p-4 shadow">

            <input type="text" id="marca" class="form-control mb-3" placeholder="Ingrese la marca">
            <input type="text" id="modelo" class="form-control mb-3" placeholder="Ingrese el modelo">
            <input type="text" id="anio" class="form-control mb-3" placeholder="Ingrese el año">
            <input type="text" id="color" class="form-control mb-3" placeholder="Ingrese el color">
            <input type="text" id="estado" class="form-control mb-3" placeholder="Ingrese el estado">
            <input type="text" id="precio" class="form-control mb-3" placeholder="Ingrese el precio">

            <button id="btnMostrar" class="btn btn-primary w-100">MOSTRAR DATOS</button>
        </div>

        <div id="resultado" class="mt-4"></div>

    </div>
</body>
</html>
