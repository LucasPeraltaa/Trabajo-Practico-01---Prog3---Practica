<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 03 - TP1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">

    <script src="app.js" defer></script>
</head>
<body>
   <div class="container mt-5">

        <h1 class="text-center mb-4">
            REGISTRO DE PORDUCTOS
        </h1>

        <div class="card p-4 shadow">

            <input 
                type="text" id="nombre" class="form-control mb-3" placeholder="Ingrese el nombre del producto">

            <input 
                type="number" id="precio" class="form-control mb-3" placeholder="Ingrese el precio">

            <textarea id="descripcion" class="form-control mb-3" placeholder="Ingrese la descripción"></textarea>

            <input 
                type="text" id="marca" class="form-control mb-3" placeholder="Ingrese la marca"
            >

            <input 
                type="number" id="descuento" class="form-control mb-3" placeholder="Ingrese porcentaje de descuento"
            >

            <button 
                class="btn btn-primary"id="btnMostrar"
            >
                MOSTRAR PRODUCTO
            </button>

        </div>

        <div id="resultado" class="mt-4"></div>

    </div>
</body>
</html>
