<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 05 - TP1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">

    <script src="app.js" defer></script>
</head>
<body>
   <div class="container mt-5">

        <h1 class="text-center mb-4">
            REGISTRO DE EMPLEADOS
        </h1>

        <div class="card p-4 shadow">

            <input type="text" id="nombre" class="form-control mb-3" placeholder="Ingrese el nombre del empleado"> 
            <input type="text" id="apellido" class="form-control mb-3" placeholder="Ingrese el apellido del empleado"> 
            <input type="number" id="dni" class="form-control mb-3" placeholder="Ingrese el DNI del empleado"> 
            <input type="text" id="direccion" class="form-control mb-3" placeholder="Ingrese la dirección del empleado"> 
            <input type="number" id="sueldoHs" class="form-control mb-3" placeholder="Ingrese horas trabajadas"> 
            <input type="number" id="precioHs" class="form-control mb-3" placeholder="Ingrese precio por hora">  

            <button class="btn btn-primary" id="btnAgregar">
                AGREGAR EMPLEADO
            </button>

        </div> 

        

    </div>
</body>
</html>
